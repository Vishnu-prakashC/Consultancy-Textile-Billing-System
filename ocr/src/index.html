<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEW GOOD NITS — Invoice OCR</title>
</head>
<body>
  <h1>NEW GOOD NITS — Region OCR</h1>
  <p>Upload an invoice image. Pipeline: OpenCV preprocess → template detection → region crop (trained layout) → OCR → smart table + validation.</p>
  <input type="file" id="file" accept="image/jpeg,image/png,image/jpg">
  <pre id="out"></pre>

  <script async src="https://docs.opencv.org/4.8.0/opencv.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script type="module">
    import { processInvoice } from "./main/InvoiceProcessor.js";

    document.getElementById("file").onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const out = document.getElementById("out");
      out.textContent = "Loading OpenCV & image...";

      const img = new Image();
      img.src = URL.createObjectURL(file);

      img.onload = async () => {
        out.textContent = "Processing (preprocess → OpenCV → OCR)...";
        try {
          const data = await processInvoice(img, {
            tesseract: window.Tesseract,
            reuseWorker: false,
            useOpenCV: true,
            useTrainedLayout: true,
            useSmartTable: true,
            logConfidence: true
          });
          out.textContent = JSON.stringify(data, null, 2);
          console.log(data);
          URL.revokeObjectURL(img.src);
        } catch (err) {
          out.textContent = "Error: " + err.message;
          console.error(err);
        }
      };
    };
  </script>
</body>
</html>
